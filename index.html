<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevilCorp | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #9fef00;
            --bg-dark: #0d1117;
            --card-bg: rgba(17, 25, 39, 0.9);
            --border: #2d333b;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            background: #000 url('DEVILCROPBG.jpeg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(159, 239, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            z-index: 10;
        }
        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
        }
        .login-card::after {
            content: '';
            position: absolute;
            top: -1px; left: 10%; width: 80%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 15px var(--accent);
        }
        .logo-img { width: 70px; height: auto; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; letter-spacing: 5px; margin: 0 0 10px 0; text-transform: uppercase; }
        .version-tag { font-size: 0.65rem; color: #555; letter-spacing: 2px; margin-bottom: 40px; }
        .input-group { text-align: left; margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.7rem; color: #9ea4b0; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .input-wrapper { background: #000; border-radius: 4px; border: 1px solid var(--border); }
        input { width: 100%; background: transparent; border: none; padding: 14px; color: var(--accent); font-family: inherit; outline: none; box-sizing: border-box; }
        .btn-submit { width: 100%; background-color: var(--accent); color: #000; border: none; padding: 16px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; transition: all 0.3s; margin-top: 10px; }
        .btn-submit:hover { box-shadow: 0 0 25px rgba(159, 239, 0, 0.5); transform: translateY(-2px); }
        #error-log { color: #ff4d4d; font-size: 0.75rem; margin-top: 25px; min-height: 20px; }
        .accent { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="DevilCrop.jpeg" alt="Logo" class="logo-img">
            <h1>DEVIL<span class="accent">CORP</span></h1>
            <div class="version-tag">PORTAL_GATEWAY v1.2.1</div>
            
            <div class="input-group">
                <label>IDENTITY_NAME</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Username" value="devilcrop">
                </div>
            </div>
            
            <div class="input-group">
                <label>SECURITY_KEY</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>

            <button class="btn-submit" onclick="validate()">Authorize Session</button>
            <div id="error-log"></div>
        </div>
    </div>

    <script>
        function validate() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const log = document.getElementById('error-log');

            if (u === 'devilcrop' && p === 'password123') {
                // Use both storage methods for maximum compatibility
                localStorage.setItem('dc_portal_session', 'active');
                sessionStorage.setItem('dc_portal_session', 'active');
                window.location.href = 'theory.html';
            } else {
                log.textContent = '[FAIL] Auth Error: Invalid identity or key.';
                setTimeout(() => { log.textContent = ''; }, 3000);
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validate();
        });
    </script>
</body>
</html>
