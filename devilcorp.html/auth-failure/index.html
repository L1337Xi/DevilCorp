<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevilCorp | Internal Support</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9fef00; --bg: #0d1117; --card: #1c2333; --border: #2d333b; --error: #ff4d4d; }
        body { font-family: 'JetBrains Mono', monospace; background: url('../../DEVILCROPBG.jpeg') no-repeat center center fixed; background-size: cover; color: #fff; margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(13, 17, 23, 0.95); border: 1px solid var(--border); border-radius: 8px; padding: 40px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: var(--accent); font-size: 1.1rem; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: var(--accent); border-radius: 4px; outline: none; font-family: inherit; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }
        .btn-login { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-login:hover { box-shadow: 0 0 15px var(--accent); }
        .btn-back { display: block; width: 100%; background: transparent; border: 1px solid #444; color: #888; padding: 10px; cursor: pointer; border-radius: 4px; font-family: inherit; font-size: 0.7rem; margin-top: 15px; text-transform: uppercase; }
        .btn-back:hover { border-color: #666; color: #ccc; }
        .status-msg { margin-top: 20px; font-size: 0.8rem; min-height: 20px; }
        .hidden { display: none; }
        .success { color: var(--accent); }
        .error { color: var(--error); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>INTERNAL_SUPPORT</h1>
        
        <!-- Phase 1: Username/Password -->
        <div id="phase-1">
            <p style="font-size: 0.75rem; color: #9ea4b0; margin-bottom: 25px;">RESTRICTED ACCESS: PHASE 1 AUTH</p>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="it_support">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="login()">SIGN IN</button>
        </div>

        <!-- Phase 2: 2FA Verification -->
        <div id="phase-2" class="hidden">
            <p style="font-size: 0.75rem; color: #9ea4b0; margin-bottom: 25px;">[ALERT] 2FA VERIFICATION REQUIRED</p>
            <div class="form-group">
                <label>Enter 6-Digit OTP</label>
                <input type="text" id="otp-input" placeholder="e.g. 123456" style="text-align: center; letter-spacing: 5px;">
            </div>
            <button class="btn-login" onclick="verify2fa()">VERIFY CODE</button>
            <button class="btn-back" onclick="backToLogin()">← BACK TO LOGIN</button>
            <p id="mail-link-container" style="font-size: 0.7rem; color: #555; margin-top: 20px;">
                OTP sent to registered mailbox.<br>
                <a href="../mail/it_support/my-account/" target="_blank" style="color:var(--accent); text-decoration: underline;">[ ACCESS MAILBOX ]</a>
            </p>
        </div>

        <div id="status" class="status-msg"></div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            fetch('/api/login-support', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('phase-1').classList.add('hidden');
                    document.getElementById('phase-2').classList.remove('hidden');
                    status.textContent = '';
                    
                    const mailLinkContainer = document.getElementById('mail-link-container');
                    if (u === 'admin') {
                        mailLinkContainer.innerHTML = 'OTP has sent to the mail';
                    } else {
                        mailLinkContainer.innerHTML = `
                            OTP sent to registered mailbox.<br>
                            <a href="../mail/it_support/my-account/" target="_blank" style="color:var(--accent); text-decoration: underline;">[ ACCESS MAILBOX ]</a>
                        `;
                    }
                } else {
                    status.className = 'status-msg error';
                    status.textContent = '[ERROR] Invalid credentials.';
                }
            });
        }

        function verify2fa() {
            const otp = document.getElementById('otp-input').value.trim();
            const status = document.getElementById('status');

            fetch('/api/verify-2fa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    status.className = 'status-msg success';
                    status.innerHTML = `[SUCCESS] SESSION VERIFIED. Redirecting...`;
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    status.className = 'status-msg error';
                    status.textContent = '[ERROR] ' + data.message;
                }
            });
        }

        function backToLogin() {
            document.getElementById('phase-2').classList.add('hidden');
            document.getElementById('phase-1').classList.remove('hidden');
            document.getElementById('status').textContent = '';
            document.getElementById('otp-input').value = '';
        }
    </script>
</body>
</html>
