<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevilCorp | Admin Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #9fef00; --bg: #0d1117; --card: #1c2333; --border: #2d333b; --critical: #ff4d4d; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; margin: 0; padding: 0; min-height: 100vh; }
        header { background: #000; padding: 15px 40px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(159, 239, 0, 0.2); }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .admin-panel { background: rgba(13, 17, 23, 0.95); border: 1px solid var(--border); border-radius: 8px; padding: 40px; text-align: center; position: relative; }
        h1 { color: var(--accent); letter-spacing: 5px; font-size: 1.5rem; margin-bottom: 40px; }
        
        .system-status { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-box { background: #080808; border: 1px solid #222; padding: 20px; border-radius: 4px; }
        .stat-label { font-size: 0.7rem; color: #555; margin-bottom: 10px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--accent); }

        .flag-vault { margin-top: 40px; padding: 30px; border: 2px dashed var(--accent); background: rgba(159, 239, 0, 0.05); border-radius: 8px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(159, 239, 0, 0.1); } to { box-shadow: 0 0 30px rgba(159, 239, 0, 0.3); } }
        
        .flag-text { font-size: 1.4rem; font-weight: bold; letter-spacing: 2px; color: #fff; margin: 20px 0; }
        .accent { color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold; letter-spacing: 3px;">DEVIL<span class="accent">CORP</span> ROOT_MAINFRAME</div>
        <div style="font-size: 0.75rem;">SESSION: <span class="accent">SYSTEM_ADMIN_ROOT</span></div>
    </header>

    <div class="container">
        <div class="admin-panel">
            <h1>ADMINISTRATOR_COMMAND_CENTER</h1>
            
            <div class="system-status">
                <div class="stat-box">
                    <div class="stat-label">SECURITY_OVERRIDE</div>
                    <div class="stat-value">ACTIVE</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">GLOBAL_CLEARANCE</div>
                    <div class="stat-value">LEVEL_9 (ROOT)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">INTRUSION_ALERTS</div>
                    <div class="stat-value" style="color:var(--critical)">0 DETECTED</div>
                </div>
            </div>

            <div class="flag-vault">
                <div style="font-size: 0.8rem; color: var(--accent); margin-bottom: 15px;">[!] GLOBAL SYSTEM FLAG DECRYPTED [!]</div>
                <div class="flag-text">
                    DEVILCORP{2FA_Mail_Broken_Implementation_Bypass}
                </div>
                <div style="font-size: 0.7rem; color: #555;">AUTHORIZED ACCESS ONLY - IP LOGGED</div>
            </div>
        </div>
    </div>
</body>
</html>
