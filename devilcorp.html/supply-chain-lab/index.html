<!DOCTYPE html>
<html lang="en">

    <style>
        :root { --accent: #9fef00; --bg: #0d1117; --card: #1c2333; --border: #2d333b; }

        .action-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { text-decoration: none; padding: 12px; border-radius: 4px; font-weight: bold; transition: all 0.2s; font-size: 0.9rem; border: 1px solid var(--accent); display: block; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-outline { color: var(--accent); background: transparent; }
        .btn:hover { box-shadow: 0 0 15px var(--accent); transform: scale(1.02); }
    </style>
</head>
